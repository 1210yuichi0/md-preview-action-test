name: Markdown Preview Comment

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "ADR/**/*.md"

concurrency:
  group: md-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  md-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed markdown files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: "ADR/**/*.md"

      - name: Build comment body
        if: steps.changed.outputs.any_changed == 'true'
        id: comment
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          delimiter="ENDOFCOMMENT_$(date +%s)"

          total_files=0
          total_lines=0
          total_chars=0
          table_rows=""
          file_list=()

          for file in $CHANGED_FILES; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            file_list+=("$file")
            total_files=$((total_files + 1))
            lines=$(wc -l < "$file" | tr -d ' ')
            chars=$(wc -m < "$file" | tr -d ' ')
            total_lines=$((total_lines + lines))
            total_chars=$((total_chars + chars))
            table_rows+="| ${total_files} | \`${file}\` | ${lines} |"$'\n'
          done

          read_min=$(( (total_chars + 499) / 500 ))
          [ "$read_min" -lt 1 ] && read_min=1

          {
            echo "body<<${delimiter}"
            echo "## ­¤ō¢ Markdown Preview"
            echo ""
            echo "Õżēµø┤ŃüĢŃéīŃü¤ Markdown ŃāĢŃéĪŃéżŃā½Ńü«Ńā¼Ńā│ŃāĆŃā¬Ńā│Ńé░ŃāŚŃā¼ŃāōŃāźŃā╝Ńü¦ŃüÖŃĆé"
            echo ""
            echo "­¤ōŖ **${total_files} files** ┬Ę **${total_lines} lines** ┬Ę ~${read_min} min read"
            echo ""
            echo "| # | ŃāĢŃéĪŃéżŃā½ | ĶĪīµĢ░ |"
            echo "|---|---------|------|"
            printf "%s" "$table_rows"
            echo ""
            echo "---"
            echo ""

            max_len=0
            idx=0
            for file in "${file_list[@]}"; do
              idx=$((idx + 1))
              label="${idx}. ­¤ōä ${file} "
              label_len=${#label}
              [ "$label_len" -gt "$max_len" ] && max_len=$label_len
            done
            total_width=$((max_len + 10))

            idx=0
            for file in "${file_list[@]}"; do
              idx=$((idx + 1))
              label="${idx}. ­¤ōä ${file} "
              label_len=${#label}
              pad_len=$((total_width - label_len))
              [ "$pad_len" -lt 4 ] && pad_len=4
              separator=$(printf '=%.0s' $(seq 1 $pad_len))
              echo "<details>"
              echo "<summary><b>${label}${separator}</b></summary>"
              echo ""
              cat "$file"
              echo ""
              echo "</details>"
              echo ""
            done

            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: steps.changed.outputs.any_changed == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: md-preview
          message: ${{ steps.comment.outputs.body }}
