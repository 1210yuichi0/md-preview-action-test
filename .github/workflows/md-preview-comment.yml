name: Markdown Preview Comment

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "ADR/**/*.md"

concurrency:
  group: md-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  md-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get changed markdown files
        id: changed
        uses: tj-actions/changed-files@48d8f15b2aaa3d255ca5af3eba4870f807ce6b3c # v45
        with:
          files: "ADR/**/*.md"

      - name: Build comment body
        if: steps.changed.outputs.any_changed == 'true'
        id: comment
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          delimiter="ENDOFCOMMENT_$(date +%s)"

          total_files=0
          total_lines=0
          total_chars=0
          table_rows=""
          file_list=()

          for file in $CHANGED_FILES; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            file_list+=("$file")
            total_files=$((total_files + 1))
            lines=$(wc -l < "$file" | tr -d ' ')
            chars=$(wc -m < "$file" | tr -d ' ')
            total_lines=$((total_lines + lines))
            total_chars=$((total_chars + chars))
            table_rows+="| ${total_files} | \`${file}\` | ${lines} |"$'\n'
          done

          read_min=$(( (total_chars + 499) / 500 ))
          [ "$read_min" -lt 1 ] && read_min=1

          {
            echo "body<<${delimiter}"
            echo "## 📖 Markdown Preview"
            echo ""
            echo "変更された Markdown ファイルのレンダリングプレビューです。"
            echo ""
            echo "📊 **${total_files} files** · **${total_lines} lines** · ~${read_min} min read"
            echo ""
            echo "| # | ファイル | 行数 |"
            echo "|---|---------|------|"
            printf "%s" "$table_rows"
            echo ""
            echo "---"
            echo ""

            max_path_len=0
            for file in "${file_list[@]}"; do
              [ "${#file}" -gt "$max_path_len" ] && max_path_len=${#file}
            done
            sep_len=10

            idx=0
            for file in "${file_list[@]}"; do
              idx=$((idx + 1))
              pad_count=$((max_path_len - ${#file}))
              padding=$(printf ' %.0s' $(seq 1 $((pad_count + 1))) 2>/dev/null || echo " ")
              separator=$(printf '=%.0s' $(seq 1 $sep_len))
              echo "<details>"
              echo "<summary><code><b>${idx}. ${file}${padding}${separator}</b></code></summary>"
              echo ""
              cat "$file"
              echo ""
              echo "</details>"
              echo ""
            done

            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: steps.changed.outputs.any_changed == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: md-preview
          message: ${{ steps.comment.outputs.body }}
