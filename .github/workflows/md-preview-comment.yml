name: Markdown Preview Comment

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "ADR/**/*.md"

concurrency:
  group: md-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  md-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed markdown files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: "ADR/**/*.md"

      - name: Build comment body
        if: steps.changed.outputs.any_changed == 'true'
        id: comment
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          # Collect metrics
          total_files=0
          total_lines=0
          total_chars=0
          table_header="| # | ファイル | 行数 |"
          table_sep="|---|---------|------|"
          table_rows=""
          for file in $CHANGED_FILES; do
            [ -z "$file" ] && continue
            total_files=$((total_files + 1))
            lines=$(wc -l < "$file" | tr -d ' ')
            chars=$(wc -m < "$file" | tr -d ' ')
            total_lines=$((total_lines + lines))
            total_chars=$((total_chars + chars))
            table_rows+="| ${total_files} | \`${file}\` | ${lines} |"$'\n'
          done
          read_min=$(( (total_chars + 499) / 500 ))
          [ "$read_min" -lt 1 ] && read_min=1

          # Build details sections
          details=""
          idx=0
          for file in $CHANGED_FILES; do
            [ -z "$file" ] && continue
            idx=$((idx + 1))
            details+="<details>"$'\n'
            details+="<summary><b>${idx}. 📄 ${file}</b></summary>"$'\n'
            details+=$'\n'
            details+=$(cat "$file")
            details+=$'\n\n'
            details+="</details>"$'\n\n'
          done

          {
            echo "body<<ENDOFCOMMENT"
            echo "## 📖 Markdown Preview"
            echo ""
            echo "変更された Markdown ファイルのレンダリングプレビューです。"
            echo ""
            echo "📊 **${total_files} files** · **${total_lines} lines** · ~${read_min} min read"
            echo ""
            echo "$table_header"
            echo "$table_sep"
            echo "$table_rows"
            echo "---"
            echo ""
            echo "$details"
            echo "ENDOFCOMMENT"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: steps.changed.outputs.any_changed == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: md-preview
          message: ${{ steps.comment.outputs.body }}
